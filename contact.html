<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - WebCraft</title>
  <link rel="icon" href="images/logo.png" type="image/png">

  <link rel="stylesheet" href="bootstrap/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- 🔹 Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light shadow">
    <div class="container">

      <a class="navbar-brand d-flex align-items-center" href="index.html">
        <img src="images/logo.png" width="40" class="me-2">
        <span>WebCraft</span>
      </a>

      <!-- زرار الموبايل -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto text-center">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        </ul>

        <button id="darkBtn" class="btn btn-dark ms-lg-3 mt-3 mt-lg-0 w-100 w-lg-auto">
          Dark Mode
        </button>
      </div>

    </div>
  </nav>

  <!-- 🔥 Header -->
  <section class="hero text-center">
    <div class="container">
      <h1>Contact Us</h1>
      <p>We are here to help you</p>
    </div>
  </section>

  <!-- 🔥 Contact Form -->
  <div class="container">
    <div class="row justify-content-center">

      <div class="col-md-6 mx-auto">
        <form id="contactForm" novalidate>

          <div class="mb-3">
            <label>Name</label>
            <input type="text" id="name" class="form-control">
            <small class="text-danger" id="nameError"></small>
          </div>

          <div class="mb-3">
            <label>Email</label>
            <input type="email" id="email" class="form-control">
            <small class="text-danger" id="emailError"></small>
          </div>

          <div class="mb-3">
            <label>Message</label>
            <textarea id="message" class="form-control"></textarea>
            <small class="text-danger" id="messageError"></small>
          </div>

          <button class="btn btn-success w-100">Send Message</button>

        </form>

      </div>

    </div>
  </div>

  <!-- 🔥 Info Section -->
  <section class="bg-light text-center">
    <div class="container">
      <h3>Our Info</h3>
      <p>Email: webcraft@gmail.com</p>
      <p>Phone: +20 123 456 789</p>
    </div>
  </section>

  <!-- 🔥 Footer -->
  <footer class="text-center p-4 bg-dark text-white">
    <p>© 2026 WebCraft</p>
  </footer>

  <script src="bootstrap/bootstrap.min.js"></script>
  <script src="js/script.js"></script>

</body>

</html>
